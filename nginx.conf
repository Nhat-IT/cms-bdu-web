# CMS BDU - Nginx Configuration
# Copy this to your nginx sites-available folder

server {
    listen 80;
    server_name your-domain.com;
    root /var/www/html/cms_bdu;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/cms_bdu_access.log;
    error_log /var/log/nginx/cms_bdu_error.log;

    # Main PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to config files
    location ~* /(config|controllers|layouts)/.*\.php$ {
        deny all;
        return 404;
    }

    # Static files caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1w;
        add_header Cache-Control "public, immutable";
    }

    # Deny directory listing
    autoindex off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
